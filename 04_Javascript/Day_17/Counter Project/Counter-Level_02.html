<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Counter</title>
    <style>
        /* Thoda achha dikhane ke liye basic styling */
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        #counter {
            font-size: 80px;
            margin: 20px 0;
            transition: color 0.3s ease; /* Smooth color change */
        }
        #status {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        button {
            font-size: 20px;
            padding: 10px 25px;
            margin: 0 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1 id="counter">0</h1>
    <p id="status">Zero</p> 

    <button id="minusBtn">-</button>
    <button id="plusBtn">+</button>

    <script src="Counter-Level_02.js"></script>
</body>
</html>
