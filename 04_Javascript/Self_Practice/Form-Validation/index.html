<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Enrollment Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container">
        <!-- Form Section -->
        <div class="form-box">
            <h2>Student Registration</h2>
            <p>Please fill the details carefully</p>
            
            <form onsubmit="return store()">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="name" placeholder="Enter your full name">
                </div>

                <div class="input-group">
                    <label>Age</label>
                    <input type="text" id="age" placeholder="Enter age (18-30)">
                </div>

                <div class="input-group">
                    <label>Contact Number</label>
                    <input type="text" id="contact" placeholder="10-digit mobile number">
                </div>

                <input type="submit" value="Submit Application" class="btn-submit">
            </form>
        </div>

        <!-- Result Card (Initialy Hidden) -->
        <div id="result-card" class="card" style="display: none;">
            <div class="card-header">
                <h3>Admission Receipt</h3>
            </div>
            <div class="card-body">
                <p><strong>Name:</strong> <span id="res_name"></span></p>
                <p><strong>Age:</strong> <span id="res_age"></span></p>
                <p><strong>Contact:</strong> <span id="res_contact"></span></p>
                <div class="status-badge">Verified & Eligible</div>
            </div>
            <button onclick="window.print()" class="btn-print">Download Receipt</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
